<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket Static File Server</title>
</head>

<body>
    <h1>🚀 Rocket 🚀</h1>
    <p id="countdown">Liftoff in 10 seconds...</p>
</body>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 50px;
    }

    h1 {
        color: #d33847;
    }

    #countdown {
        font-size: 1.5em;
        color: #333;
    }
</style>

<script defer>
    let countdownElement = document.getElementById('countdown');
    let countdown = 10;

    let interval = setInterval(() => {
        if (countdown > 0) {
            countdown--;
            countdownElement.textContent = `Liftoff in ${countdown} seconds...`;
        } else {
            countdownElement.textContent = "🔥 Liftoff! 🔥";
            clearInterval(interval);
        }
    }, 1000);
</script>

</html>
